services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 5

  init-ollama:
    image: ollama/ollama:latest
    depends_on:
      ollama:
        condition: service_healthy
    restart: "no"
    entrypoint: ["ollama", "pull", "phi3:mini"]
    environment:
      - OLLAMA_HOST=http://ollama:11434

  rag-app:
    build: .
    container_name: rag-app
    ports:
      - "8501:8501"
    depends_on:
      ollama:
        condition: service_healthy
      init-ollama:
        condition: service_completed_successfully
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
    volumes:
      - ./documents:/app/documents
      - rag_cache:/app/.cache

volumes:
  ollama_data:
  rag_cache:
